apiVersion: apps/v1
kind: Deployment
metadata:
  name: filebrowser
  namespace: filebrowser
spec:
  replicas: 1
  selector:
    matchLabels:
      app: filebrowser
  template:
    metadata:
      labels:
        app: filebrowser
    spec:
      containers:
        - name: filebrowser
          image: filebrowser/filebrowser:latest
          ports:
            - containerPort: 80
          volumeMounts:
            - name: config
              mountPath: /database
            - name: media
              mountPath: /srv/media
            - name: mybook
              mountPath: /srv/mybook
            - name: passport
              mountPath: /srv/passport
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: filebrowser-config-pvc
        - name: media
          persistentVolumeClaim:
            claimName: filebrowser-media-pvc
        - name: mybook
          persistentVolumeClaim:
            claimName: filebrowser-mybook-pvc
        - name: passport
          persistentVolumeClaim:
            claimName: filebrowser-passport-pvc
